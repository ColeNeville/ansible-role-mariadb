---
name: Cluster

on:
  push:
    paths:
      - "files/**"
      - "handlers/**"
      - "molecule/cluster/**"
      - "tasks/**"
      - "templates/**"
      - "vars/**"
      - .github/workflows/composite-action/action.yml
      - .github/workflows/test_cluster.yml
      - requirements.txt
  schedule:
    - cron: "30 5 * * 2"

jobs:
  molecule-distrib-pkg:
    name: Cluster
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - almalinux-10
          - alpine-3.22
          - alpine-3.23
          - alpine-edge
          - centos-stream10
          - centos-stream9
          - debian-12
          - debian-13
          - fedora-43
          - rockylinux-9
          - ubuntu-22.04
          - ubuntu-24.04
          - ubuntu-26.04
    steps:
      - uses: actions/checkout@v6
      - name: Setup environment
        uses: ./.github/workflows/composite-action
      - name: Run molecule
        run: |
          source .venv/bin/activate
          molecule test -s cluster
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
          MOLECULE_DISTRO: ${{ matrix.distro }}
